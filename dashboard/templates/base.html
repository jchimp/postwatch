<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Postwatch{% block title_suffix %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body>

{% if session.get("logged_in") %}
<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('overview') }}"><i class="bi bi-envelope-paper"></i> Postwatch</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'overview' %} active{% endif %}"
                       href="{{ url_for('overview') }}"><i class="bi bi-speedometer2"></i> Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'logs_page' %} active{% endif %}"
                       href="{{ url_for('logs_page') }}"><i class="bi bi-journal-text"></i> Logs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'queue_page' %} active{% endif %}"
                       href="{{ url_for('queue_page') }}"><i class="bi bi-inbox"></i> Queue</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'tokens_page' %} active{% endif %}"
                       href="{{ url_for('tokens_page') }}"><i class="bi bi-key"></i> Tokens</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'settings' %} active{% endif %}"
                       href="{{ url_for('settings') }}"><i class="bi bi-gear"></i> Settings</a>
                </li>
            </ul>
            <span class="navbar-text me-3 text-muted">
                Logged in as <strong>{{ session.username }}</strong>
            </span>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
</nav>
{% endif %}

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<main class="container-fluid py-4">
    {% block content %}{% endblock %}
</main>

<!-- ── Loading Modal ────────────────────────────────────────────────────────── -->
<div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status">
                    <span class="visually-hidden">Loading…</span>
                </div>
                <p class="text-muted">Fetching data from agent…</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ── Shared Loading Modal Utilities ──────────────────────────────────────── -->
<script>
// Only show modal if fetch takes longer than this (ms)
const LOADING_MODAL_DELAY_MS = 300;
// Force-hide modal after this timeout (ms)
const LOADING_MODAL_TIMEOUT_MS = 5000;

function showLoadingModal() {
    const modal = new bootstrap.Modal(document.getElementById('loadingModal'), {backdrop: 'static'});
    modal.show();
}

function hideLoadingModal() {
    const modal = bootstrap.Modal.getInstance(document.getElementById('loadingModal'));
    if (modal) modal.hide();
}

function setupAgentSelectHandler(fetchFunction) {
    const select = document.getElementById('agentSelect');
    if (!select || select.tagName !== 'SELECT') return;

    select.addEventListener('change', async () => {
        let showDelayTimer = null;
        let forceHideTimer = null;
        let modalShown = false;

        try {
            // Delay showing modal to avoid flicker for fast responses
            showDelayTimer = setTimeout(() => {
                showLoadingModal();
                modalShown = true;
            }, LOADING_MODAL_DELAY_MS);

            // Force hide after max timeout
            forceHideTimer = setTimeout(() => {
                if (modalShown) hideLoadingModal();
            }, LOADING_MODAL_TIMEOUT_MS);

            // Run the fetch
            await fetchFunction();
        } catch (err) {
            console.warn('Agent fetch error:', err.message);
        } finally {
            // Clean up timers
            clearTimeout(showDelayTimer);
            clearTimeout(forceHideTimer);

            // Hide modal if it was shown
            if (modalShown) hideLoadingModal();
        }
    });
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
