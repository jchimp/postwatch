<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Postwatch{% block title_suffix %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body>

{% if session.get("logged_in") %}
<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('overview') }}">&#x1F4EC; Postwatch</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'overview' %} active{% endif %}"
                       href="{{ url_for('overview') }}">Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'logs_page' %} active{% endif %}"
                       href="{{ url_for('logs_page') }}">Logs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'queue_page' %} active{% endif %}"
                       href="{{ url_for('queue_page') }}">Queue</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.endpoint == 'tokens_page' %} active{% endif %}"
                       href="{{ url_for('tokens_page') }}">Tokens</a>
                </li>
            </ul>
            <span class="navbar-text me-3 text-muted">
                Logged in as <strong>{{ session.username }}</strong>
            </span>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
</nav>
{% endif %}

<!-- ── Content ─────────────────────────────────────────────────────────────── -->
<main class="container-fluid py-4">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
