version: "3.8"

services:
  dashboard:
    build: .
    container_name: postwatch-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
